version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: hireops-db
    environment:
      POSTGRES_DB: hireops
      POSTGRES_USER: hireops
      POSTGRES_PASSWORD: hireops_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireops"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireops-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://hireops:hireops_secret@db:5432/hireops
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hireops-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    container_name: hireops-backup
    environment:
      PGHOST: db
      PGUSER: hireops
      PGPASSWORD: hireops_secret
      PGDATABASE: hireops
      BACKUP_DIR: /backups
    volumes:
      - ./deploy/backup.sh:/usr/local/bin/backup.sh:ro
      - pgbackups:/backups
    depends_on:
      db:
        condition: service_healthy
    # Run pg_dump every 24h. /usr/local/bin/backup.sh handles retention itself.
    entrypoint: >
      sh -c "while true; do /usr/local/bin/backup.sh || true; sleep 86400; done"
    restart: unless-stopped

volumes:
  pgdata:
  pgbackups:
