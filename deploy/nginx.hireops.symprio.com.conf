# Nginx server block for hireops.symprio.com
#
# DROP THIS INTO: /etc/nginx/sites-available/hireops.symprio.com
# Then enable:
#   ln -s /etc/nginx/sites-available/hireops.symprio.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Assumes you already have certbot/Let's Encrypt set up the same way as
# symprio.com. If not, run:
#   certbot --nginx -d hireops.symprio.com
# certbot will auto-edit this file to add the SSL block.

# ── Backend ports (matches docker-compose.prod.yml) ──
upstream hireops_backend  { server 127.0.0.1:8017; }
upstream hireops_frontend { server 127.0.0.1:3017; }

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hireops.symprio.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hireops.symprio.com;

    # Certbot will fill these in (or copy paths from your existing symprio.com
    # nginx config if you set up the cert manually).
    # ssl_certificate     /etc/letsencrypt/live/hireops.symprio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hireops.symprio.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow large resume uploads (PDFs can be a few MB)
    client_max_body_size 10M;

    # ── Stripe webhook: needs raw body, no rewrites ──
    # Routed to backend like other /api/v1/* requests; the webhook handler
    # verifies signatures so we don't add nginx-level filtering.

    # ── Backend API ──
    location /api/ {
        proxy_pass         http://hireops_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # Stream audio (interview recording) without buffering
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # ── Health probes (uptime monitoring etc.) ──
    location = /health {
        proxy_pass http://hireops_backend/health;
        access_log off;
    }

    # ── Everything else → Next.js frontend ──
    location / {
        proxy_pass         http://hireops_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js can take a bit to render server pages
        proxy_read_timeout 30s;
    }

    # Tighter cache for static assets (Next.js fingerprints these)
    location /_next/static/ {
        proxy_pass http://hireops_frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    access_log /var/log/nginx/hireops.access.log;
    error_log  /var/log/nginx/hireops.error.log;
}
