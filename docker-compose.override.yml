# Dev-mode overrides — auto-merged on `docker-compose up` (no --file flag needed).
#
# Adds bind mounts + hot-reload so code edits on disk show up in the running
# containers without a rebuild. The base docker-compose.yml stays
# production-clean (used by deploy/ and HF Spaces builds).
#
# Tear down with `docker-compose -f docker-compose.yml up` to ignore overrides
# (or just delete this file when shipping). Mac users: CHOKIDAR_USEPOLLING is
# required because Docker Desktop's bind-mount filesystem doesn't fire native
# inotify events.

services:
  backend:
    # Reload uvicorn on every Python file change. The model imports + init_db
    # run on each restart, so DB migrations from your edits land automatically.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      # Auto-watch picks up settings + .env file without restart
      WATCHFILES_FORCE_POLLING: "true"

  frontend:
    # Mount the source into the container. The named volume on /app/node_modules
    # keeps the container's npm install (Linux binaries) instead of letting the
    # Mac host overlay it with darwin-arm64 modules.
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      # Force file-watch polling on Mac/Linux Docker Desktop. Without this,
      # next dev sometimes misses changes to files inside bind mounts.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    # next dev already runs on port 3000 inside the container; no command override.

volumes:
  frontend_node_modules:
